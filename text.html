<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎页面 - GitHub友好版</title>
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 页面样式 */
        body {
            background-color: #808080;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }
        
        /* 欢迎容器 */
        .welcome-container {
            text-align: center;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            animation: fadeIn 2s ease-out;
            max-width: 90%;
        }
        
        /* 欢迎文字 */
        .welcome-text {
            font-size: 24px;
            color: #ff0000;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }
        
        /* 说明区域 */
        .explanation {
            background-color: rgba(0, 0, 0, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            text-align: left;
            color: #fff;
            font-size: 16px;
            line-height: 1.6;
        }
        
        .explanation h2 {
            color: #ffcccc;
            margin-bottom: 15px;
            text-align: center;
        }
        
        /* 动画效果 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 响应式设计 */
        @media (max-width: 600px) {
            .welcome-container {
                padding: 25px;
            }
            
            .welcome-text {
                font-size: 20px;
            }
            
            .explanation {
                font-size: 14px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="welcome-text">欢迎</div>
        <div class="explanation">
            <h2>GitHub Pages 部署提示</h2>
            <p>如果您在GitHub上遇到页面无法打开的问题，请检查：</p>
            <ol>
                <li>仓库是否设置为公开(Public)而非私有(Private)</li>
                <li>是否在仓库设置中启用了GitHub Pages（选择分支和文件夹）</li>
                <li>HTML文件是否命名为index.html并位于根目录或指定文件夹中</li>
                <li>等待1-2分钟让GitHub Pages完成部署</li>
            </ol>
            <p>如果仍有问题，请检查浏览器控制台是否有错误信息。</p>
        </div>
    </div>
    
    <script>
        // 简单的控制台提示
        console.log("欢迎页面已加载！");
        console.log("如果页面在GitHub上无法显示，请检查GitHub Pages设置。");
    </script>
</body>
</html>
